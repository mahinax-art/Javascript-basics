<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./Stylesheet.css">
    <title>フォーム</title>
</head>
<body>

    <div class="container">

        <h1>フォーム</h1>

        <div class="form-group">
            <label for="name">名前</label>
            <input type="text" id="name" placeholder="例：まひな">
        </div>
        
        <div class="form-group">
            <label for="age">年齢</label>
            <input type="number" id="age" placeholder="例：00">
        </div>

        <div class="form-group">
            <label for="foods">好きな食べ物</label>
            <input type="text" id="foods" placeholder="例：スペイン料理">
        </div>

        <div class="form-group">
            <label>プログラミングは好きですか？</label>
            <div class="checkbox-row">
                <input type="checkbox" id="program"
                <span>好きです</span>    
            </div>

<button id="run">実行</button>

<div class="mini-title">まとめ</div>
<div class="result" id="result">ここに結果が出ます</div>
</div>

<script src="./script2.js"></script>


</body>
</html>
